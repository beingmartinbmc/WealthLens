name: Deploy WealthLens to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npx ng build --base-href /WealthLens/

    - name: Create .nojekyll and 404.html for SPA routing
      run: |
        touch dist/WealthLens/browser/.nojekyll
        cp dist/WealthLens/browser/index.html dist/WealthLens/browser/404.html

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist/WealthLens/browser'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
